<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240">
    <defs>
      <pattern id="gridPattern2" width="10" height="10" patternUnits="userSpaceOnUse">
        <path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.5"></path>
      </pattern>
    </defs>
    <rect width="400" height="400" fill="#c9a8f5"></rect>
    <rect width="400" height="400" fill="url(#gridPattern2)"></rect>

    <!-- sparkles -->
    <g transform="translate(40,50)"><path d="M10 0 C10.4 6 12 8 20 10 C12 12 10.4 14 10 20 C9.6 14 8 12 0 10 C8 8 9.6 6 10 0 Z" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"></path></g>
    <g transform="translate(300,90)"><path d="M14 0 C14.6 8 17 11 28 14 C17 17 14.6 20 14 28 C13.4 20 11 17 0 14 C11 11 13.4 8 14 0 Z" fill="#fff3a0" stroke="#1a1a1a" stroke-width="1.5"></path></g>
    <g transform="translate(150,300)"><path d="M10 0 C10.4 6 12 8 20 10 C12 12 10.4 14 10 20 C9.6 14 8 12 0 10 C8 8 9.6 6 10 0 Z" fill="#fff" stroke="#1a1a1a" stroke-width="1.5"></path></g>

    <!-- heart -->
    <g transform="translate(230,240) scale(0.4)">
      <path d="M30 50 L6 28 C-2 18 6 4 20 6 C26 7 30 12 30 16 C30 12 34 7 40 6 C54 4 62 18 54 28 Z" fill="#ffb6d5" stroke="#1a1a1a" stroke-width="4" stroke-linejoin="round"></path>
    </g>

    <!-- x marks -->
    <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
      <g transform="translate(60,180)"><line x1="0" y1="0" x2="10" y2="10"></line><line x1="10" y1="0" x2="0" y2="10"></line></g>
      <g transform="translate(78,180)"><line x1="0" y1="0" x2="10" y2="10"></line><line x1="10" y1="0" x2="0" y2="10"></line></g>
      <g transform="translate(96,180)"><line x1="0" y1="0" x2="10" y2="10"></line><line x1="10" y1="0" x2="0" y2="10"></line></g>
    </g>

    <!-- plus marks -->
    <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
      <g transform="translate(320,320)"><line x1="5" y1="0" x2="5" y2="10"></line><line x1="0" y1="5" x2="10" y2="5"></line></g>
      <g transform="translate(335,320)"><line x1="5" y1="0" x2="5" y2="10"></line><line x1="0" y1="5" x2="10" y2="5"></line></g>
    </g>
  </svg>